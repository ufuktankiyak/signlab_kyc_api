name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: signlab
          POSTGRES_PASSWORD: signlab123
          POSTGRES_DB: signlab_kyc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U signlab"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://signlab:signlab123@localhost:5432/signlab_kyc
      SECRET_KEY: ci-test-secret-key
      STORAGE_PATH: /tmp/signlab_storage

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
