version: "3.9"

services:
  db:
    image: postgres:15
    container_name: signlab_postgres
    environment:
      POSTGRES_USER: signlab
      POSTGRES_PASSWORD: signlab123
      POSTGRES_DB: signlab_kyc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped

  api:
    build:
      context: ../signlab_kyc_dotnet
      dockerfile: SignlabKyc.Api/Dockerfile
    container_name: signlab_kyc_api
    ports:
      - "8000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=signlab_kyc;Username=signlab;Password=signlab123"
      Jwt__SecretKey: "${SECRET_KEY:-supersecretkey123456789abcdef0123456789abcdef01234567}"
      Jwt__AccessTokenExpireMinutes: "60"
      PythonService__BaseUrl: "http://ocr-service:5001"
      PythonService__TimeoutSeconds: "35"
      Storage__Path: "/app/storage"
      Serilog__WriteTo__1__Name: "Elasticsearch"
      Serilog__WriteTo__1__Args__nodeUris: "http://elasticsearch:9200"
      ASPNETCORE_ENVIRONMENT: "Development"
    volumes:
      - kyc_storage:/app/storage
    depends_on:
      - db
      - ocr-service
      - elasticsearch
    restart: unless-stopped

  ocr-service:
    build: .
    container_name: signlab_ocr_service
    expose:
      - "5001"
    environment:
      OCR_PORT: "5001"
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: signlab_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: signlab_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  postgres_data:
  kyc_storage:
  es_data:
