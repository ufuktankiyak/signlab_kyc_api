version: "3.9"

services:
  db:
    image: postgres:15
    container_name: signlab_postgres
    environment:
      POSTGRES_USER: signlab
      POSTGRES_PASSWORD: signlab123
      POSTGRES_DB: signlab_kyc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped

  api:
    build: .
    container_name: signlab_kyc_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://signlab:signlab123@db:5432/signlab_kyc
      STORAGE_PATH: /app/storage
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: signlab-business-logs
      ELASTICSEARCH_ENABLED: "true"
    volumes:
      - .:/app
      - kyc_storage:/app/storage
    depends_on:
      - db
      - elasticsearch
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: signlab_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: signlab_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  postgres_data:
  kyc_storage:
  es_data:
